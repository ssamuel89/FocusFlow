<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusFlow - ADHD Friendly Tasks</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Lexend', 'sans-serif'] },
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;700&display=swap');
        body { font-family: 'Lexend', sans-serif; transition: all 0.3s ease; }
        
        .priority-bar-3 { border-left: 10px solid #ef4444 !important; } /* High */
        .priority-bar-2 { border-left: 10px solid #f59e0b !important; } /* Med */
        .priority-bar-1 { border-left: 10px solid #10b981 !important; } /* Low */

        .progress-ring { transition: stroke-dashoffset 0.35s; transform: rotate(-90deg); transform-origin: 50% 50%; }
        .content-wrapper { padding-bottom: 140px; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }

        .subtask-item { animation: slideIn 0.15s ease-out; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-3px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .app-logo {
            width: 42px;
            height: 42px;
            filter: drop-shadow(0 4px 6px rgba(79, 70, 229, 0.2));
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 min-h-screen">

    <div class="content-wrapper">
        <header class="p-6 max-w-2xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <svg class="app-logo" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="45" stroke="currentColor" stroke-width="2" class="text-indigo-600/20 dark:text-indigo-400/20" />
                    <path d="M50 20C33.4315 20 20 33.4315 20 50C20 66.5685 33.4315 80 50 80C66.5685 80 80 66.5685 80 50" stroke="currentColor" stroke-width="8" stroke-linecap="round" class="text-indigo-600 dark:text-indigo-400" />
                    <path d="M50 50L75 25" stroke="currentColor" stroke-width="8" stroke-linecap="round" class="text-emerald-500" />
                    <circle cx="50" cy="50" r="6" fill="currentColor" class="text-indigo-600 dark:text-indigo-400" />
                </svg>
                <div>
                    <h1 class="text-2xl font-bold text-indigo-600 dark:text-indigo-400 leading-tight">FocusFlow</h1>
                    <p id="dateDisplay" class="text-[10px] uppercase tracking-widest font-bold text-slate-400"></p>
                </div>
            </div>
            <button onclick="toggleTheme()" class="p-3 rounded-xl bg-white dark:bg-slate-800 shadow-sm text-xl border border-slate-100 dark:border-slate-700">
                <i id="themeIcon" class="fas fa-moon"></i>
            </button>
        </header>

        <main class="max-w-2xl mx-auto px-4 space-y-6">
            <!-- Brain Dump Input -->
            <section class="bg-white dark:bg-slate-800 p-6 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-700">
                <div class="flex justify-between items-center mb-2">
                    <h2 class="text-xs font-bold uppercase tracking-widest text-slate-400">Brain Dump</h2>
                    <span class="text-[9px] text-slate-400 uppercase tracking-tight">Shift + Enter to fast-add steps</span>
                </div>
                <div class="flex flex-col gap-4">
                    <div class="flex gap-2">
                        <input type="text" id="taskInput" placeholder="Task name #1 (for high priority)" 
                            class="w-full bg-slate-50 dark:bg-slate-900 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 text-sm border border-transparent">
                        <button onclick="addTask()" class="bg-indigo-600 text-white px-6 rounded-2xl font-bold hover:bg-indigo-700 active:scale-95 text-sm">Add</button>
                    </div>
                    <div class="flex items-center justify-between">
                        <div class="flex gap-4 text-[10px] font-bold uppercase tracking-wider text-slate-500 items-center">
                            <label class="flex items-center gap-1 cursor-pointer"><input type="radio" name="priority" value="1" class="accent-emerald-500"> <span>Low</span></label>
                            <label class="flex items-center gap-1 cursor-pointer"><input type="radio" name="priority" value="2" checked class="accent-amber-500"> <span>Med</span></label>
                            <label class="flex items-center gap-1 cursor-pointer"><input type="radio" name="priority" value="3" class="accent-red-500"> <span>High</span></label>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="clearCompleted()" class="text-[10px] font-bold uppercase tracking-widest bg-slate-100 dark:bg-slate-700 px-3 py-1.5 rounded-lg text-slate-500 hover:text-red-500 transition-colors">
                                <i class="fas fa-broom mr-1"></i> Clear Done
                            </button>
                            <button onclick="sortByPriority()" class="text-[10px] font-bold uppercase tracking-widest bg-slate-100 dark:bg-slate-700 px-3 py-1.5 rounded-lg text-slate-500 hover:text-indigo-600 transition-colors">
                                <i class="fas fa-sort-amount-down mr-1"></i> Sort
                            </button>
                        </div>
                    </div>
                </div>
            </section>

            <div id="taskList" class="space-y-4"></div>
        </main>
    </div>

    <!-- Enhanced Bottom Bar -->
    <footer class="fixed bottom-0 left-0 right-0 bg-white/90 dark:bg-slate-800/90 backdrop-blur-md border-t border-slate-200 dark:border-slate-700 p-4 z-40">
        <div class="max-w-2xl mx-auto flex items-center justify-between gap-4">
            <div class="flex-1 flex gap-2">
                <button onclick="exportTasks()" class="flex-1 text-[10px] font-bold uppercase bg-slate-100 dark:bg-slate-700 py-3 rounded-xl hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">
                    <i class="fas fa-file-export mr-1 text-emerald-500"></i> Export
                </button>
                <label class="flex-1 text-[10px] font-bold uppercase bg-slate-100 dark:bg-slate-700 py-3 rounded-xl hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors text-center cursor-pointer">
                    <i class="fas fa-file-import mr-1 text-indigo-500"></i> Import
                    <input type="file" class="hidden" accept=".json" onchange="importTasks(event)">
                </label>
            </div>
            <button onclick="downloadAppHTML()" class="bg-indigo-600 text-white px-5 py-3 rounded-xl shadow-lg hover:bg-indigo-700 active:scale-95 flex items-center gap-2">
                <i class="fas fa-download"></i>
                <span class="text-[11px] font-bold">Offline App</span>
            </button>
        </div>
    </footer>

    <!-- Focus Overlay -->
    <div id="focusOverlay" class="fixed inset-0 bg-white dark:bg-slate-900 z-50 hidden flex flex-col items-center justify-center p-6 overflow-y-auto">
        <button onclick="closeFocus()" class="absolute top-8 right-8 text-2xl text-slate-400 p-2 hover:text-red-500 transition-colors"><i class="fas fa-times"></i></button>
        <div class="max-w-md w-full py-12 space-y-8 text-center">
            <h2 id="focusTitle" class="text-3xl font-bold mb-4"></h2>
            <div class="relative mb-8 mx-auto w-48 h-48">
                <svg width="200" height="200">
                    <circle cx="100" cy="100" r="90" fill="none" stroke="currentColor" stroke-width="10" class="text-slate-100 dark:text-slate-800" />
                    <circle id="timerRing" cx="100" cy="100" r="90" fill="none" stroke="#4f46e5" stroke-width="10" stroke-dasharray="565" stroke-dashoffset="0" class="progress-ring" />
                </svg>
                <div id="timerDisplay" class="absolute inset-0 flex items-center justify-center text-4xl font-mono font-bold">25:00</div>
            </div>
            <div class="flex gap-3">
                <button id="timerBtn" onclick="toggleTimer()" class="flex-1 bg-indigo-600 text-white py-4 rounded-2xl text-lg font-bold shadow-xl active:scale-95">Start Focus</button>
                <button onclick="completeTaskFromFocus()" class="flex-1 bg-emerald-500 text-white py-4 rounded-2xl text-lg font-bold shadow-xl active:scale-95">Done!</button>
            </div>
            
            <!-- Restructured Focus Subtasks -->
            <div class="bg-slate-50 dark:bg-slate-800/50 p-6 rounded-3xl border border-slate-100 dark:border-slate-700 space-y-4 text-left">
                <h3 class="text-sm font-bold uppercase tracking-widest text-slate-400">Tiny Steps</h3>
                
                <!-- Quick Add for Focus Screen -->
                <div class="flex gap-2">
                    <input type="text" id="focusSubtaskInput" onkeypress="if(event.key==='Enter') addSubtask(currentFocusId, this)" placeholder="Add a missing step..." 
                        class="flex-1 bg-white dark:bg-slate-900 px-4 py-2.5 rounded-xl text-sm border border-slate-200 dark:border-slate-700 outline-none focus:ring-2 focus:ring-indigo-500">
                    <button onclick="addSubtask(currentFocusId, document.getElementById('focusSubtaskInput'))" class="bg-indigo-600 text-white px-4 rounded-xl font-bold text-sm">Add</button>
                </div>

                <div id="overlaySubtaskContainer" class="space-y-4">
                    <div id="overlaySubtaskList" class="space-y-2"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-28 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full text-sm font-medium shadow-2xl opacity-0 transition-opacity pointer-events-none z-[100]"></div>

    <script>
        let tasks = JSON.parse(localStorage.getItem('ff_tasks')) || [];
        let currentFocusId = null;
        let timeLeft = 25 * 60;
        let timerRunning = false;
        let timerInterval;

        function render() {
            const list = document.getElementById('taskList');
            if (tasks.length === 0) {
                list.innerHTML = `<div class="text-center py-10 opacity-50"><p>Your brain is clear.</p></div>`;
                return;
            }
            list.innerHTML = tasks.map(t => {
                const subtasks = t.subtasks || [];
                const completedCount = subtasks.filter(s => s.completed).length;
                const priorityValue = parseInt(t.priority || 2);
                
                return `
                <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 priority-bar-${priorityValue} overflow-hidden">
                    <div class="p-5 flex items-center justify-between">
                        <div class="flex items-center gap-4 flex-1 overflow-hidden">
                            <input type="checkbox" ${t.completed ? 'checked' : ''} onclick="toggleTask(${t.id})" class="w-6 h-6 shrink-0 rounded-full border-2 border-indigo-500 accent-indigo-500 cursor-pointer">
                            <div class="truncate">
                                <span class="${t.completed ? 'line-through text-slate-400' : 'font-semibold text-lg'}">${t.text}</span>
                                <div class="flex items-center gap-3 mt-1">
                                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">
                                        <i class="fas fa-tasks mr-1"></i> ${completedCount} / ${subtasks.length} steps
                                    </p>
                                    <button onclick="toggleSubtaskVisibility(${t.id})" class="text-[10px] font-bold text-indigo-500 uppercase hover:underline">
                                        ${t.showSubtasks ? 'Hide Steps' : 'View Steps'}
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="openFocus(${t.id})" class="text-indigo-500 w-10 h-10 rounded-xl hover:bg-indigo-50 dark:hover:bg-indigo-900/30 transition-colors"><i class="fas fa-bullseye"></i></button>
                            <button onclick="deleteTask(${t.id})" class="text-slate-300 w-10 h-10 hover:text-red-500 transition-colors"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                    
                    <div id="main-subtasks-${t.id}" class="${t.showSubtasks ? '' : 'hidden'} bg-slate-50 dark:bg-slate-900/50 p-4 border-t border-slate-100 dark:border-slate-700 space-y-3">
                        <div class="flex gap-2">
                            <input type="text" id="inline-sub-input-${t.id}" onkeypress="if(event.key==='Enter') addSubtask(${t.id}, this)" placeholder="Add a tiny step..." class="flex-1 bg-white dark:bg-slate-800 px-3 py-2 rounded-lg text-xs border border-slate-200 dark:border-slate-700 outline-none">
                            <button onclick="addSubtask(${t.id}, document.getElementById('inline-sub-input-${t.id}'))" class="bg-indigo-600 text-white px-3 py-2 rounded-lg text-xs font-bold">Add</button>
                        </div>
                        <div class="space-y-1">
                            ${subtasks.map((s, idx) => `
                                <div class="flex items-center gap-2 p-2 hover:bg-white dark:hover:bg-slate-800 rounded-lg group subtask-item">
                                    <input type="checkbox" ${s.completed ? 'checked' : ''} onclick="toggleSubtask(${t.id}, ${idx})" class="w-4 h-4 accent-indigo-500 cursor-pointer">
                                    <span class="text-xs flex-1 ${s.completed ? 'line-through text-slate-400' : ''}">${s.text}</span>
                                    <button onclick="deleteSubtask(${t.id}, ${idx})" class="opacity-0 group-hover:opacity-100 text-slate-300 hover:text-red-500 transition-opacity"><i class="fas fa-times text-[10px]"></i></button>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function addTask(forceSubtaskFocus = false) {
            const input = document.getElementById('taskInput');
            let text = input.value.trim();
            if (!text) return;

            let priority = document.querySelector('input[name="priority"]:checked').value;
            ['#1', '#2', '#3'].forEach((tag, index) => {
                if (text.includes(tag)) {
                    priority = [3, 2, 1][index];
                    text = text.replace(tag, '').trim();
                }
            });
            
            const newId = Date.now();
            tasks.unshift({ id: newId, text, priority, completed: false, subtasks: [], showSubtasks: forceSubtaskFocus });
            input.value = '';
            save();

            if (forceSubtaskFocus) {
                setTimeout(() => document.getElementById(`inline-sub-input-${newId}`)?.focus(), 100);
            }
        }

        function save() {
            localStorage.setItem('ff_tasks', JSON.stringify(tasks));
            render();
            if (currentFocusId) renderOverlaySubtasks();
        }

        function toggleTask(id) { tasks = tasks.map(t => t.id === id ? {...t, completed: !t.completed} : t); save(); }
        function deleteTask(id) { tasks = tasks.filter(t => t.id !== id); save(); }
        function toggleSubtaskVisibility(id) { tasks = tasks.map(t => t.id === id ? { ...t, showSubtasks: !t.showSubtasks } : t); save(); }

        function clearCompleted() {
            const initialLen = tasks.length;
            tasks = tasks.filter(t => !t.completed);
            const removed = initialLen - tasks.length;
            if (removed > 0) {
                save();
                showToast(`Cleared ${removed} task${removed === 1 ? '' : 's'}!`);
            } else showToast("No completed tasks to clear.");
        }

        function sortByPriority() { 
            tasks.sort((a,b) => b.priority - a.priority); 
            save(); 
            showToast("Sorted by priority!");
        }

        function addSubtask(taskId, inputEl) {
            const text = inputEl.value.trim();
            if (!text) return;
            tasks = tasks.map(t => t.id === taskId ? { ...t, subtasks: [...t.subtasks, { text, completed: false }] } : t);
            inputEl.value = '';
            save();
        }

        function toggleSubtask(taskId, idx) {
            tasks = tasks.map(t => {
                if (t.id === taskId) {
                    const subtasks = [...t.subtasks];
                    subtasks[idx].completed = !subtasks[idx].completed;
                    return { ...t, subtasks };
                }
                return t;
            });
            save();
        }

        function deleteSubtask(taskId, idx) {
            tasks = tasks.map(t => {
                if (t.id === taskId) {
                    const subtasks = t.subtasks.filter((_, i) => i !== idx);
                    return { ...t, subtasks };
                }
                return t;
            });
            save();
        }

        // --- Focus Overlay Logic ---
        function openFocus(id) {
            currentFocusId = id;
            const task = tasks.find(t => t.id === id);
            document.getElementById('focusTitle').textContent = task.text;
            document.getElementById('focusOverlay').classList.remove('hidden');
            renderOverlaySubtasks();
            resetTimer();
        }

        function renderOverlaySubtasks() {
            const task = tasks.find(t => t.id === currentFocusId);
            const list = document.getElementById('overlaySubtaskList');
            list.innerHTML = (task.subtasks || []).map((s, idx) => `
                <div class="flex items-center gap-3 p-3 bg-white dark:bg-slate-900 rounded-xl border border-slate-100 dark:border-slate-700 subtask-item group">
                    <input type="checkbox" ${s.completed ? 'checked' : ''} onclick="toggleSubtask(${currentFocusId}, ${idx})" class="w-5 h-5 accent-indigo-500 cursor-pointer">
                    <span class="text-sm flex-1 ${s.completed ? 'line-through opacity-50' : ''}">${s.text}</span>
                    <button onclick="deleteSubtask(${currentFocusId}, ${idx})" class="opacity-0 group-hover:opacity-100 text-slate-300 hover:text-red-500 transition-opacity"><i class="fas fa-trash text-xs"></i></button>
                </div>`).join('') || `<p class="text-xs text-slate-400 text-center py-4 italic">No tiny steps. Add one above!</p>`;
        }

        function closeFocus() { document.getElementById('focusOverlay').classList.add('hidden'); clearInterval(timerInterval); timerRunning = false; currentFocusId = null; }
        function completeTaskFromFocus() { toggleTask(currentFocusId); closeFocus(); }
        
        function toggleTimer() {
            const btn = document.getElementById('timerBtn');
            if (timerRunning) { clearInterval(timerInterval); btn.textContent = "Resume"; } 
            else {
                timerInterval = setInterval(() => { 
                    timeLeft--; 
                    updateTimerUI(); 
                    if (timeLeft <= 0) { clearInterval(timerInterval); showToast("Time's up!"); } 
                }, 1000);
                btn.textContent = "Pause";
            }
            timerRunning = !timerRunning;
        }

        function resetTimer() { timeLeft = 25 * 60; updateTimerUI(); document.getElementById('timerBtn').textContent = "Start Focus"; }
        function updateTimerUI() {
            const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
            document.getElementById('timerDisplay').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
            document.getElementById('timerRing').style.strokeDashoffset = 565 - (timeLeft / (25 * 60)) * 565;
        }

        function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.style.opacity = 1; setTimeout(() => t.style.opacity = 0, 3000); }
        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            document.getElementById('themeIcon').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }
        
        function exportTasks() {
            const data = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(tasks));
            const a = document.createElement('a'); a.href = data; a.download = "tasks.json"; a.click();
        }

        function importTasks(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try { tasks = JSON.parse(e.target.result); save(); showToast("Imported!"); } 
                catch (err) { showToast("Invalid file."); }
            };
            reader.readAsText(file);
        }

        function downloadAppHTML() {
            const blob = new Blob([document.documentElement.outerHTML], { type: 'text/html' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'FocusFlow.html'; a.click();
        }

        document.getElementById('taskInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') { e.preventDefault(); addTask(e.shiftKey); }
        });

        document.getElementById('dateDisplay').textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
        if (localStorage.getItem('theme') === 'dark') { document.documentElement.classList.add('dark'); document.getElementById('themeIcon').className = 'fas fa-sun'; }

        render();
    </script>
</body>
</html>
