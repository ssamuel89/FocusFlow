<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusFlow - ADHD Friendly Tasks</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Lexend', 'sans-serif'] },
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;700&display=swap');
        body { font-family: 'Lexend', sans-serif; transition: all 0.3s ease; }
        .energy-low { border-left: 6px solid #10b981; }
        .energy-medium { border-left: 6px solid #f59e0b; }
        .energy-high { border-left: 6px solid #ef4444; }
        .progress-ring { transition: stroke-dashoffset 0.35s; transform: rotate(-90deg); transform-origin: 50% 50%; }
        
        .content-wrapper { padding-bottom: 120px; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }

        .subtask-item { animation: slideIn 0.2s ease-out; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Logo styling to ensure it fits the brand colors */
        .app-logo {
            width: 42px;
            height: 42px;
            filter: drop-shadow(0 4px 6px rgba(79, 70, 229, 0.2));
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 min-h-screen">

    <div class="content-wrapper">
        <header class="p-6 max-w-2xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <!-- Inline SVG Logo for FocusFlow -->
                <svg class="app-logo" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="45" stroke="currentColor" stroke-width="2" class="text-indigo-600/20 dark:text-indigo-400/20" />
                    <path d="M50 20C33.4315 20 20 33.4315 20 50C20 66.5685 33.4315 80 50 80C66.5685 80 80 66.5685 80 50" stroke="currentColor" stroke-width="8" stroke-linecap="round" class="text-indigo-600 dark:text-indigo-400" />
                    <path d="M50 50L75 25" stroke="currentColor" stroke-width="8" stroke-linecap="round" class="text-emerald-500" />
                    <circle cx="50" cy="50" r="6" fill="currentColor" class="text-indigo-600 dark:text-indigo-400" />
                </svg>
                <div>
                    <h1 class="text-2xl font-bold text-indigo-600 dark:text-indigo-400 leading-tight">FocusFlow</h1>
                    <p id="dateDisplay" class="text-[10px] uppercase tracking-widest font-bold text-slate-400"></p>
                </div>
            </div>
            <button onclick="toggleTheme()" class="p-3 rounded-xl bg-white dark:bg-slate-800 shadow-sm text-xl transition-transform active:scale-90 border border-slate-100 dark:border-slate-700">
                <i id="themeIcon" class="fas fa-moon"></i>
            </button>
        </header>

        <main class="max-w-2xl mx-auto px-4 space-y-6">
            <!-- Add Task Section -->
            <section class="bg-white dark:bg-slate-800 p-6 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-700">
                <h2 class="text-xs font-bold uppercase tracking-widest text-slate-400 mb-4">Brain Dump</h2>
                <div class="flex gap-2">
                    <input type="text" id="taskInput" placeholder="What's on your mind? (Press Enter)" 
                        class="w-full bg-slate-50 dark:bg-slate-900 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 text-sm border border-transparent focus:border-indigo-200 dark:focus:border-indigo-900">
                    <button onclick="addTask()" class="bg-indigo-600 text-white px-6 rounded-2xl font-bold hover:bg-indigo-700 transition-colors active:scale-95 text-sm">Add</button>
                </div>
                <div class="mt-4 flex gap-4 text-[10px] font-bold uppercase tracking-wider text-slate-500 items-center">
                    <span class="opacity-60">Energy:</span>
                    <label class="flex items-center gap-1 cursor-pointer hover:text-emerald-500 transition-colors"><input type="radio" name="energy" value="low" checked class="accent-emerald-500"> <span>Low</span></label>
                    <label class="flex items-center gap-1 cursor-pointer hover:text-amber-500 transition-colors"><input type="radio" name="energy" value="medium" class="accent-amber-500"> <span>Mid</span></label>
                    <label class="flex items-center gap-1 cursor-pointer hover:text-red-500 transition-colors"><input type="radio" name="energy" value="high" class="accent-red-500"> <span>High</span></label>
                </div>
            </section>

            <!-- Task List -->
            <div id="taskList" class="space-y-4 min-h-[100px]"></div>
        </main>
    </div>

    <!-- Storage Bar -->
    <footer class="fixed bottom-0 left-0 right-0 bg-white/90 dark:bg-slate-800/90 backdrop-blur-md border-t border-slate-200 dark:border-slate-700 p-4 z-40">
        <div class="max-w-2xl mx-auto flex items-center justify-between gap-4">
            <div class="flex-1">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Backup & Restore</p>
                <div class="flex gap-2">
                    <label class="flex-1 bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 text-slate-700 dark:text-slate-200 text-center py-2 px-3 rounded-xl cursor-pointer transition-colors text-[11px] font-bold flex items-center justify-center gap-2">
                        <i class="fas fa-file-import text-indigo-500"></i>
                        <span>Import</span>
                        <input type="file" class="hidden" accept=".json" onchange="importTasks(event)">
                    </label>
                    <button onclick="exportTasks()" class="flex-1 bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 text-slate-700 dark:text-slate-200 py-2 px-3 rounded-xl transition-colors text-[11px] font-bold flex items-center justify-center gap-2">
                        <i class="fas fa-file-export text-emerald-500"></i>
                        <span>Export</span>
                    </button>
                </div>
            </div>
            <div class="h-10 w-px bg-slate-200 dark:bg-slate-700"></div>
            <button onclick="downloadAppHTML()" class="p-3 bg-indigo-600 text-white rounded-xl shadow-lg hover:bg-indigo-700 transition-all active:scale-95 flex items-center gap-2">
                <i class="fas fa-download"></i>
                <span class="text-[11px] font-bold hidden sm:inline">Offline App</span>
            </button>
        </div>
    </footer>

    <!-- Focus Mode Overlay -->
    <div id="focusOverlay" class="fixed inset-0 bg-white dark:bg-slate-900 z-50 hidden flex flex-col items-center justify-center p-6 overflow-y-auto">
        <button onclick="closeFocus()" class="absolute top-8 right-8 text-2xl text-slate-400 hover:text-slate-600 transition-colors p-2"><i class="fas fa-times"></i></button>
        
        <div class="max-w-md w-full py-12 space-y-8">
            <header class="text-center">
                <div class="flex justify-center mb-4">
                    <svg class="w-12 h-12 text-indigo-600 dark:text-indigo-400" viewBox="0 0 100 100" fill="none">
                        <path d="M50 20C33.4315 20 20 33.4315 20 50C20 66.5685 33.4315 80 50 80C66.5685 80 80 66.5685 80 50" stroke="currentColor" stroke-width="8" stroke-linecap="round" />
                        <path d="M50 50L75 25" stroke="#10b981" stroke-width="8" stroke-linecap="round" />
                    </svg>
                </div>
                <h2 id="focusTitle" class="text-3xl font-bold mb-4"></h2>
                
                <div class="relative mb-8 mx-auto w-48 h-48">
                    <svg width="200" height="200">
                        <circle cx="100" cy="100" r="90" fill="none" stroke="currentColor" stroke-width="10" class="text-slate-100 dark:text-slate-800" />
                        <circle id="timerRing" cx="100" cy="100" r="90" fill="none" stroke="#4f46e5" stroke-width="10" stroke-dasharray="565" stroke-dashoffset="0" class="progress-ring" />
                    </svg>
                    <div id="timerDisplay" class="absolute inset-0 flex items-center justify-center text-4xl font-mono font-bold">25:00</div>
                </div>

                <div class="flex gap-3">
                    <button id="timerBtn" onclick="toggleTimer()" class="flex-1 bg-indigo-600 text-white py-4 rounded-2xl text-lg font-bold shadow-xl transition-all active:scale-95">Start Focus</button>
                    <button onclick="completeTaskFromFocus()" class="flex-1 bg-emerald-500 text-white py-4 rounded-2xl text-lg font-bold shadow-xl transition-all active:scale-95">Done!</button>
                </div>
            </header>

            <div id="breakdownSection" class="bg-slate-50 dark:bg-slate-800/50 p-6 rounded-3xl border border-slate-100 dark:border-slate-700 space-y-4">
                <h3 class="text-sm font-bold uppercase tracking-widest text-slate-400">Tiny Steps</h3>
                <div class="flex gap-2">
                    <input type="text" id="manualSubtaskInput" 
                        onkeypress="if(event.key==='Enter') addManualSubtask()"
                        placeholder="Add a tiny step..." 
                        class="w-full bg-white dark:bg-slate-900 px-4 py-3 rounded-xl text-sm border border-slate-200 dark:border-slate-700 outline-none focus:ring-2 focus:ring-indigo-500 shadow-inner">
                    <button onclick="addManualSubtask()" class="bg-indigo-600 text-white px-5 rounded-xl text-sm font-bold active:scale-95">Add</button>
                </div>
                <div id="subtaskList" class="space-y-2"></div>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-28 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full text-sm font-medium shadow-2xl opacity-0 transition-opacity pointer-events-none z-[100]"></div>

    <script>
        let tasks = JSON.parse(localStorage.getItem('ff_tasks')) || [];
        let currentFocusId = null;
        let timeLeft = 25 * 60;
        let timerRunning = false;
        let timerInterval;

        function render() {
            const list = document.getElementById('taskList');
            if (tasks.length === 0) {
                list.innerHTML = `<div class="text-center py-10 opacity-50"><i class="fas fa-feather-alt text-4xl mb-2"></i><p>Your brain is clear.</p></div>`;
                return;
            }
            list.innerHTML = tasks.map(t => {
                const subtasks = t.subtasks || [];
                const completedSubtasks = subtasks.filter(s => s.completed).length;
                const totalSubtasks = subtasks.length;
                
                return `
                <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 energy-${t.energy} overflow-hidden transition-all">
                    <div class="p-5 flex items-center justify-between group">
                        <div class="flex items-center gap-4 overflow-hidden">
                            <input type="checkbox" ${t.completed ? 'checked' : ''} onclick="toggleTask(${t.id})" class="w-6 h-6 shrink-0 rounded-full border-2 border-indigo-500 cursor-pointer accent-indigo-500">
                            <div class="truncate">
                                <span class="${t.completed ? 'line-through text-slate-400' : 'font-semibold text-lg'}">${t.text}</span>
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter mt-1">
                                    <i class="fas fa-tasks mr-1"></i> ${completedSubtasks} / ${totalSubtasks} steps
                                </p>
                            </div>
                        </div>
                        <div class="flex gap-2 shrink-0">
                            <button onclick="openFocus(${t.id})" title="Focus Mode" class="text-indigo-500 hover:bg-indigo-50 dark:hover:bg-indigo-900/30 w-10 h-10 rounded-xl transition-colors"><i class="fas fa-bullseye text-lg"></i></button>
                            <button onclick="deleteTask(${t.id})" title="Delete" class="text-slate-300 hover:text-red-500 w-10 h-10 rounded-xl transition-colors"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                    
                    <div class="bg-slate-50 dark:bg-slate-900/50 p-4 border-t border-slate-100 dark:border-slate-700 space-y-3">
                        <div class="flex gap-2">
                            <input type="text" 
                                id="inline-sub-input-${t.id}" 
                                onkeypress="if(event.key==='Enter') addInlineSubtask(${t.id})"
                                placeholder="Add a tiny step..." 
                                class="flex-1 bg-white dark:bg-slate-800 px-3 py-2 rounded-lg text-xs border border-slate-200 dark:border-slate-700 outline-none focus:ring-2 focus:ring-indigo-500 shadow-sm">
                            <button onclick="addInlineSubtask(${t.id})" class="bg-indigo-600 text-white px-3 py-2 rounded-lg text-xs font-bold active:scale-95">Add</button>
                        </div>
                        <div class="space-y-1">
                            ${subtasks.map((s, idx) => `
                                <div class="flex items-center gap-2 p-2 hover:bg-white dark:hover:bg-slate-800 rounded-lg group subtask-item">
                                    <input type="checkbox" ${s.completed ? 'checked' : ''} onclick="toggleInlineSubtask(${t.id}, ${idx})" class="w-4 h-4 rounded border-slate-300 accent-indigo-500">
                                    <span class="text-xs flex-1 ${s.completed ? 'line-through text-slate-400' : 'text-slate-600 dark:text-slate-300'}">${s.text}</span>
                                    <button onclick="deleteInlineSubtask(${t.id}, ${idx})" class="opacity-0 group-hover:opacity-100 text-slate-300 hover:text-red-500 px-1 transition-opacity">
                                        <i class="fas fa-times text-[10px]"></i>
                                    </button>
                                </div>
                            `).join('')}
                            ${subtasks.length === 0 ? '<p class="text-[10px] text-center text-slate-400 py-1">No steps yet. Break it down!</p>' : ''}
                        </div>
                    </div>
                </div>
            `}).join('');
        }

        function save() {
            localStorage.setItem('ff_tasks', JSON.stringify(tasks));
            render();
        }

        function addTask() {
            const input = document.getElementById('taskInput');
            const text = input.value.trim();
            if (!text) return;
            const energy = document.querySelector('input[name="energy"]:checked').value;
            tasks.unshift({ id: Date.now(), text, energy, completed: false, subtasks: [] });
            input.value = '';
            save();
        }

        function toggleTask(id) {
            tasks = tasks.map(t => t.id === id ? {...t, completed: !t.completed} : t);
            save();
        }

        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            save();
        }

        function addInlineSubtask(taskId) {
            const input = document.getElementById(`inline-sub-input-${taskId}`);
            const text = input.value.trim();
            if (!text) return;

            tasks = tasks.map(t => {
                if (t.id === taskId) {
                    return { ...t, subtasks: [...(t.subtasks || []), { text, completed: false }] };
                }
                return t;
            });
            input.value = '';
            save();
        }

        function toggleInlineSubtask(taskId, subIdx) {
            tasks = tasks.map(t => {
                if (t.id === taskId) {
                    const newSubs = [...t.subtasks];
                    newSubs[subIdx].completed = !newSubs[subIdx].completed;
                    return { ...t, subtasks: newSubs };
                }
                return t;
            });
            save();
        }

        function deleteInlineSubtask(taskId, subIdx) {
            tasks = tasks.map(t => {
                if (t.id === taskId) {
                    const newSubs = [...t.subtasks];
                    newSubs.splice(subIdx, 1);
                    return { ...t, subtasks: newSubs };
                }
                return t;
            });
            save();
        }

        function addManualSubtask() {
            const input = document.getElementById('manualSubtaskInput');
            const text = input.value.trim();
            if (!text) return;
            tasks = tasks.map(t => t.id === currentFocusId ? { ...t, subtasks: [...t.subtasks, { text, completed: false }] } : t);
            input.value = '';
            save();
            renderSubtasks();
        }

        function renderSubtasks() {
            const task = tasks.find(t => t.id === currentFocusId);
            if (!task) return;
            const list = document.getElementById('subtaskList');
            list.innerHTML = task.subtasks.map((s, idx) => `
                <div class="flex items-center gap-3 p-3 bg-white dark:bg-slate-900 rounded-xl border border-slate-100 dark:border-slate-700 shadow-sm transition-all">
                    <input type="checkbox" ${s.completed ? 'checked' : ''} onclick="toggleInlineSubtask(${currentFocusId}, ${idx}); renderSubtasks();" class="w-5 h-5 rounded-full border-2 border-indigo-400 cursor-pointer accent-indigo-500">
                    <span class="text-sm font-medium flex-1 ${s.completed ? 'line-through opacity-50 text-slate-400' : ''}">${s.text}</span>
                    <button onclick="deleteInlineSubtask(${currentFocusId}, ${idx}); renderSubtasks();" class="text-slate-300 hover:text-red-500 p-1"><i class="fas fa-times text-xs"></i></button>
                </div>`).join('') || `<p class="text-center text-xs text-slate-400 py-6 italic">Break it down into tiny steps.</p>`;
        }

        function exportTasks() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(tasks, null, 2));
            const dl = document.createElement('a');
            dl.setAttribute("href", dataStr);
            dl.setAttribute("download", "focusflow_tasks.json");
            dl.click();
            showToast("Backup exported!");
        }

        function importTasks(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    tasks = JSON.parse(e.target.result);
                    save();
                    showToast("Imported successfully!");
                } catch (err) { showToast("Invalid file."); }
            };
            reader.readAsText(file);
        }

        function downloadAppHTML() {
            const blob = new Blob([document.documentElement.outerHTML], { type: 'text/html' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'FocusFlow.html';
            a.click();
            showToast("App saved!");
        }

        function openFocus(id) {
            currentFocusId = id;
            const task = tasks.find(t => t.id === id);
            document.getElementById('focusTitle').textContent = task.text;
            document.getElementById('focusOverlay').classList.remove('hidden');
            document.getElementById('focusOverlay').classList.add('flex');
            renderSubtasks();
            resetTimer();
        }

        function closeFocus() {
            document.getElementById('focusOverlay').classList.add('hidden');
            document.getElementById('focusOverlay').classList.remove('flex');
            clearInterval(timerInterval);
            timerRunning = false;
        }

        function completeTaskFromFocus() { toggleTask(currentFocusId); closeFocus(); }

        function toggleTimer() {
            const btn = document.getElementById('timerBtn');
            if (timerRunning) { clearInterval(timerInterval); btn.textContent = "Resume"; } 
            else {
                timerInterval = setInterval(() => { timeLeft--; updateTimerUI(); if (timeLeft <= 0) { clearInterval(timerInterval); showToast("Time's up!"); } }, 1000);
                btn.textContent = "Pause";
            }
            timerRunning = !timerRunning;
        }

        function resetTimer() { timeLeft = 25 * 60; updateTimerUI(); document.getElementById('timerBtn').textContent = "Start Focus"; }
        function updateTimerUI() {
            const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
            document.getElementById('timerDisplay').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
            document.getElementById('timerRing').style.strokeDashoffset = 565 - (timeLeft / (25 * 60)) * 565;
        }

        function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.style.opacity = 1; setTimeout(() => t.style.opacity = 0, 3000); }
        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            document.getElementById('themeIcon').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        document.getElementById('taskInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTask();
        });

        document.getElementById('dateDisplay').textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
        if (localStorage.getItem('theme') === 'dark') { document.documentElement.classList.add('dark'); document.getElementById('themeIcon').className = 'fas fa-sun'; }

        render();
    </script>
</body>
</html>
