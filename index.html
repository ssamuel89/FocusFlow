<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusFlow - ADHD Friendly Tasks</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;700&display=swap');
        
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --accent: #6366f1;
        }

        body {
            font-family: 'Lexend', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            transition: all 0.3s ease;
        }

        .task-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .energy-low { border-left: 6px solid #10b981; }
        .energy-medium { border-left: 6px solid #f59e0b; }
        .energy-high { border-left: 6px solid #ef4444; }

        .progress-ring {
            transition: stroke-dashoffset 0.35s;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        @keyframes pulse-soft {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .focus-pulse {
            animation: pulse-soft 3s infinite ease-in-out;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="min-h-screen pb-24">

    <!-- Header -->
    <header class="p-6 max-w-2xl mx-auto flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-bold text-indigo-600">FocusFlow</h1>
            <p class="text-sm text-slate-500" id="current-date"></p>
        </div>
        <button onclick="toggleTheme()" class="p-2 rounded-full bg-slate-200 hover:bg-slate-300 transition-colors">
            🌙
        </button>
    </header>

    <main class="max-w-2xl mx-auto px-4 space-y-6">
        
        <!-- Quick Brain Dump -->
        <section class="bg-indigo-50 p-5 rounded-2xl border-2 border-dashed border-indigo-200">
            <h2 class="text-sm font-semibold text-indigo-700 mb-3 flex items-center gap-2">
                🧠 Brain Dump
                <span class="text-[10px] font-normal text-indigo-400 bg-white px-2 py-0.5 rounded-full border border-indigo-100 italic">Clear your head</span>
            </h2>
            <div class="flex gap-2">
                <input type="text" id="taskInput" placeholder="I need to..." 
                    class="w-full p-3 rounded-xl border-none focus:ring-2 focus:ring-indigo-400 outline-none shadow-sm"
                    onkeypress="if(event.key === 'Enter') addTask()">
                <button onclick="addTask()" class="bg-indigo-600 text-white px-6 rounded-xl font-bold hover:bg-indigo-700 transition-all active:scale-95">
                    Add
                </button>
            </div>
            <div class="mt-4 flex flex-wrap gap-4 text-xs">
                <span class="font-medium text-slate-600">Current Energy:</span>
                <label class="flex items-center gap-1 cursor-pointer">
                    <input type="radio" name="energy" value="low" checked class="accent-emerald-500"> 
                    <span class="px-2 py-0.5 rounded bg-emerald-100 text-emerald-700">Low</span>
                </label>
                <label class="flex items-center gap-1 cursor-pointer">
                    <input type="radio" name="energy" value="medium" class="accent-amber-500"> 
                    <span class="px-2 py-0.5 rounded bg-amber-100 text-amber-700">Mid</span>
                </label>
                <label class="flex items-center gap-1 cursor-pointer">
                    <input type="radio" name="energy" value="high" class="accent-red-500"> 
                    <span class="px-2 py-0.5 rounded bg-red-100 text-red-700">High</span>
                </label>
            </div>
        </section>

        <!-- Filters -->
        <section class="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
            <button onclick="filterTasks('all')" class="filter-btn whitespace-nowrap px-4 py-2 rounded-full bg-slate-800 text-white text-sm font-medium transition-all">All Tasks</button>
            <button onclick="filterTasks('low')" class="filter-btn whitespace-nowrap px-4 py-2 rounded-full bg-white text-slate-600 border border-slate-200 text-sm font-medium transition-all">Low Energy</button>
            <button onclick="filterTasks('medium')" class="filter-btn whitespace-nowrap px-4 py-2 rounded-full bg-white text-slate-600 border border-slate-200 text-sm font-medium transition-all">Medium Energy</button>
            <button onclick="filterTasks('high')" class="filter-btn whitespace-nowrap px-4 py-2 rounded-full bg-white text-slate-600 border border-slate-200 text-sm font-medium transition-all">High Energy</button>
        </section>

        <!-- Active Tasks List -->
        <section id="taskList" class="space-y-4">
            <!-- Tasks injected here -->
        </section>

        <!-- Empty State -->
        <div id="emptyState" class="text-center py-10 hidden">
            <div class="text-5xl mb-4">✨</div>
            <h3 class="text-lg font-medium text-slate-700">Brain focus achieved!</h3>
            <p class="text-slate-500">Your task list is empty.</p>
        </div>

        <!-- Data Management (Export/Import) -->
        <section class="pt-8 border-t border-slate-200">
            <div class="bg-slate-100 p-4 rounded-2xl flex flex-col sm:flex-row items-center justify-between gap-4">
                <div class="text-center sm:text-left">
                    <h3 class="text-xs font-bold text-slate-500 uppercase tracking-wider">Data Management</h3>
                    <p class="text-[10px] text-slate-400">Save your brain dump for later</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="exportData()" class="text-xs font-bold bg-white text-slate-700 px-4 py-2 rounded-lg border border-slate-200 hover:bg-slate-50 transition-colors flex items-center gap-1">
                        📤 Export JSON
                    </button>
                    <label class="text-xs font-bold bg-white text-slate-700 px-4 py-2 rounded-lg border border-slate-200 hover:bg-slate-50 transition-colors cursor-pointer flex items-center gap-1">
                        📥 Import
                        <input type="file" id="importFile" class="hidden" accept=".json" onchange="importData(event)">
                    </label>
                </div>
            </div>
        </section>

    </main>

    <!-- Focus Mode Overlay -->
    <div id="focusOverlay" class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-start p-8 hidden overflow-y-auto">
        <button onclick="exitFocusMode()" class="absolute top-6 right-6 text-slate-400 hover:text-slate-600 text-xl">
            ✕
        </button>
        
        <div class="text-center max-w-md w-full space-y-8 mt-12 pb-12">
            <div>
                <span id="focusEnergyTag" class="px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest"></span>
                <h2 id="focusTaskTitle" class="text-3xl font-bold leading-tight mt-4 text-slate-800"></h2>
            </div>
            
            <div class="relative inline-flex items-center justify-center">
                <svg width="180" height="180">
                    <circle stroke="#f1f5f9" stroke-width="8" fill="transparent" r="75" cx="90" cy="90"/>
                    <circle id="timerRing" stroke="#6366f1" stroke-width="8" stroke-dasharray="471" stroke-dashoffset="0" stroke-linecap="round" fill="transparent" r="75" cx="90" cy="90" class="progress-ring"/>
                </svg>
                <div id="timerDisplay" class="absolute text-2xl font-bold font-mono text-slate-700">25:00</div>
            </div>

            <!-- Focus Subtasks -->
            <div id="focusSubtasksContainer" class="bg-slate-50 p-4 rounded-2xl text-left space-y-3">
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider">Break it down:</h3>
                <div id="focusSubtaskList" class="space-y-2"></div>
            </div>

            <div class="space-y-6 pt-4">
                <div class="flex gap-4 justify-center">
                    <button id="timerBtn" onclick="toggleTimer()" class="flex-1 bg-indigo-600 text-white px-6 py-4 rounded-2xl font-bold shadow-lg shadow-indigo-100 hover:bg-indigo-700 transition-all">Start Timer</button>
                    <button onclick="completeFocusTask()" class="flex-1 bg-emerald-500 text-white px-6 py-4 rounded-2xl font-bold shadow-lg shadow-emerald-100 hover:bg-emerald-600 transition-all">Complete</button>
                </div>
                <p class="text-slate-400 text-sm italic focus-pulse">"Action cures fear. Just start the first step."</p>
            </div>
        </div>
    </div>

    <!-- Notification Message -->
    <div id="messageBox" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full shadow-2xl opacity-0 transition-opacity duration-300 pointer-events-none z-[100] text-sm font-medium">
        Message here
    </div>

    <script>
        let tasks = JSON.parse(localStorage.getItem('focusflow_v2_tasks')) || [];
        let timerInterval;
        let timeLeft = 25 * 60;
        let isTimerRunning = false;
        let currentFocusTaskId = null;
        let activeFilter = 'all';

        window.onload = () => {
            updateDate();
            renderTasks();
            if ("Notification" in window && Notification.permission !== "granted") {
                Notification.requestPermission();
            }
        };

        function updateDate() {
            const options = { weekday: 'long', month: 'long', day: 'numeric' };
            document.getElementById('current-date').textContent = new Date().toLocaleDateString('en-US', options);
        }

        function showMessage(text) {
            const box = document.getElementById('messageBox');
            box.textContent = text;
            box.style.opacity = '1';
            setTimeout(() => box.style.opacity = '0', 2500);
        }

        function addTask() {
            const input = document.getElementById('taskInput');
            const energy = document.querySelector('input[name="energy"]:checked').value;
            
            if (!input.value.trim()) {
                showMessage("Write something first! ✍️");
                return;
            }

            const newTask = {
                id: Date.now(),
                text: input.value,
                energy: energy,
                completed: false,
                subtasks: [],
                createdAt: new Date().toISOString()
            };

            tasks.unshift(newTask);
            saveAndRender();
            input.value = '';
            showMessage("Captured! Go focus on something else now. 🧠");
        }

        function addSubtask(taskId) {
            const input = document.getElementById(`subInput-${taskId}`);
            if (!input.value.trim()) return;

            tasks = tasks.map(t => {
                if (t.id === taskId) {
                    return {
                        ...t,
                        subtasks: [...t.subtasks, { id: Date.now(), text: input.value, completed: false }]
                    };
                }
                return t;
            });
            saveAndRender();
        }

        function toggleSubtask(taskId, subId) {
            tasks = tasks.map(t => {
                if (t.id === taskId) {
                    const newSubtasks = t.subtasks.map(s => s.id === subId ? {...s, completed: !s.completed} : s);
                    return { ...t, subtasks: newSubtasks };
                }
                return t;
            });
            saveAndRender();
            if (currentFocusTaskId === taskId) renderFocusSubtasks();
        }

        function deleteSubtask(taskId, subId) {
            tasks = tasks.map(t => {
                if (t.id === taskId) {
                    return { ...t, subtasks: t.subtasks.filter(s => s.id !== subId) };
                }
                return t;
            });
            saveAndRender();
            if (currentFocusTaskId === taskId) renderFocusSubtasks();
        }

        function toggleTask(id) {
            tasks = tasks.map(t => t.id === id ? {...t, completed: !t.completed} : t);
            saveAndRender();
        }

        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            saveAndRender();
        }

        function saveAndRender() {
            localStorage.setItem('focusflow_v2_tasks', JSON.stringify(tasks));
            renderTasks(activeFilter);
        }

        function renderTasks(filter = 'all') {
            activeFilter = filter;
            const list = document.getElementById('taskList');
            const empty = document.getElementById('emptyState');
            list.innerHTML = '';

            const filtered = tasks.filter(t => filter === 'all' || t.energy === filter);

            if (filtered.length === 0) {
                empty.classList.remove('hidden');
            } else {
                empty.classList.add('hidden');
                filtered.forEach(task => {
                    const card = document.createElement('div');
                    card.className = `task-card bg-white p-5 rounded-2xl shadow-sm space-y-4 energy-${task.energy} ${task.completed ? 'opacity-60' : ''}`;
                    
                    const subCount = task.subtasks.length;
                    const doneCount = task.subtasks.filter(s => s.completed).length;

                    card.innerHTML = `
                        <div class="flex items-start gap-4">
                            <input type="checkbox" ${task.completed ? 'checked' : ''} 
                                onchange="toggleTask(${task.id})"
                                class="mt-1 w-6 h-6 rounded-full border-2 border-slate-300 text-indigo-600 focus:ring-indigo-500 cursor-pointer">
                            <div class="flex-grow">
                                <p class="font-semibold text-slate-800 ${task.completed ? 'line-through text-slate-400' : ''}">${task.text}</p>
                                <div class="flex items-center gap-2 mt-1">
                                    <span class="text-[9px] uppercase font-bold text-slate-400 tracking-wider">${task.energy} energy</span>
                                    ${subCount > 0 ? `<span class="text-[9px] font-bold text-indigo-500 bg-indigo-50 px-2 py-0.5 rounded-full">${doneCount}/${subCount} steps</span>` : ''}
                                </div>
                            </div>
                            <div class="flex gap-1">
                                <button onclick="enterFocusMode(${task.id})" class="p-2 text-indigo-600 bg-indigo-50 rounded-xl hover:bg-indigo-100 transition-colors">🎯</button>
                                <button onclick="deleteTask(${task.id})" class="p-2 text-slate-300 hover:text-red-500">🗑️</button>
                            </div>
                        </div>

                        <div class="pl-10 space-y-2">
                            <div id="subs-${task.id}" class="space-y-1">
                                ${task.subtasks.map(s => `
                                    <div class="flex items-center gap-2 group">
                                        <input type="checkbox" ${s.completed ? 'checked' : ''} 
                                            onchange="toggleSubtask(${task.id}, ${s.id})"
                                            class="w-4 h-4 rounded border-slate-300 text-indigo-500">
                                        <span class="text-sm ${s.completed ? 'line-through text-slate-400' : 'text-slate-600'}">${s.text}</span>
                                        <button onclick="deleteSubtask(${task.id}, ${s.id})" class="opacity-0 group-hover:opacity-100 text-[10px] text-red-300 ml-auto">Delete</button>
                                    </div>
                                `).join('')}
                            </div>
                            
                            <div class="flex items-center gap-2 mt-2 pt-2 border-t border-slate-50">
                                <input type="text" id="subInput-${task.id}" placeholder="Next tiny step..." 
                                    class="text-xs w-full bg-slate-50 p-2 rounded-lg outline-none focus:bg-indigo-50 transition-colors"
                                    onkeypress="if(event.key === 'Enter') addSubtask(${task.id})">
                                <button onclick="addSubtask(${task.id})" class="text-xs font-bold text-indigo-500 hover:text-indigo-700">Add</button>
                            </div>
                        </div>
                    `;
                    list.appendChild(card);
                });
            }
        }

        function filterTasks(energy) {
            activeFilter = energy;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('bg-slate-800', 'text-white');
                btn.classList.add('bg-white', 'text-slate-600', 'border', 'border-slate-200');
            });
            event.target.classList.remove('bg-white', 'text-slate-600', 'border', 'border-slate-200');
            event.target.classList.add('bg-slate-800', 'text-white');
            renderTasks(energy);
        }

        // --- Data Persistence ---

        function exportData() {
            const dataStr = JSON.stringify(tasks, null, 2);
            const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
            const exportFileDefaultName = 'focusflow-tasks-' + new Date().toISOString().split('T')[0] + '.json';

            const linkElement = document.createElement('a');
            linkElement.setAttribute('href', dataUri);
            linkElement.setAttribute('download', exportFileDefaultName);
            linkElement.click();
            showMessage("Data exported successfully! 📁");
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedTasks = JSON.parse(e.target.result);
                    if (Array.isArray(importedTasks)) {
                        tasks = importedTasks;
                        saveAndRender();
                        showMessage("Data imported! Welcome back. 🧠");
                    } else {
                        throw new Error("Invalid format");
                    }
                } catch (err) {
                    showMessage("Oops! That file didn't look right. ❌");
                }
            };
            reader.readAsText(file);
        }

        // --- Focus Mode ---

        function enterFocusMode(id) {
            const task = tasks.find(t => t.id === id);
            currentFocusTaskId = id;
            
            document.getElementById('focusTaskTitle').textContent = task.text;
            const tag = document.getElementById('focusEnergyTag');
            tag.textContent = `${task.energy} energy`;
            
            const colors = { low: '#10b981', medium: '#f59e0b', high: '#ef4444' };
            const bgColors = { low: '#ecfdf5', medium: '#fffbeb', high: '#fef2f2' };
            tag.style.color = colors[task.energy];
            tag.style.backgroundColor = bgColors[task.energy];

            renderFocusSubtasks();

            document.getElementById('focusOverlay').style.display = 'flex';
            document.body.style.overflow = 'hidden';
            resetTimer();
        }

        function renderFocusSubtasks() {
            const task = tasks.find(t => t.id === currentFocusTaskId);
            const container = document.getElementById('focusSubtasksContainer');
            const list = document.getElementById('focusSubtaskList');
            
            if (!task.subtasks || task.subtasks.length === 0) {
                container.classList.add('hidden');
                return;
            }

            container.classList.remove('hidden');
            list.innerHTML = task.subtasks.map(s => `
                <div class="flex items-center gap-3 p-3 rounded-xl bg-white border border-slate-100 shadow-sm">
                    <input type="checkbox" ${s.completed ? 'checked' : ''} 
                        onchange="toggleSubtask(${task.id}, ${s.id})"
                        class="w-5 h-5 rounded-full border-2 border-slate-200 text-emerald-500">
                    <span class="font-medium ${s.completed ? 'line-through text-slate-300' : 'text-slate-700'}">${s.text}</span>
                </div>
            `).join('');
        }

        function exitFocusMode() {
            clearInterval(timerInterval);
            isTimerRunning = false;
            document.getElementById('focusOverlay').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function toggleTimer() {
            const btn = document.getElementById('timerBtn');
            if (isTimerRunning) {
                clearInterval(timerInterval);
                btn.textContent = 'Resume Timer';
                btn.className = "flex-1 bg-amber-500 text-white px-6 py-4 rounded-2xl font-bold";
            } else {
                startTimer();
                btn.textContent = 'Pause Timer';
                btn.className = "flex-1 bg-slate-800 text-white px-6 py-4 rounded-2xl font-bold";
            }
            isTimerRunning = !isTimerRunning;
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    notifySessionEnd();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            document.getElementById('timerDisplay').textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            const ring = document.getElementById('timerRing');
            ring.style.strokeDashoffset = 471 - (timeLeft / (25 * 60)) * 471;
        }

        function resetTimer() {
            timeLeft = 25 * 60;
            updateTimerDisplay();
            const btn = document.getElementById('timerBtn');
            btn.textContent = 'Start Timer';
            btn.className = "flex-1 bg-indigo-600 text-white px-6 py-4 rounded-2xl font-bold";
        }

        function completeFocusTask() {
            toggleTask(currentFocusTaskId);
            exitFocusMode();
            showMessage("One big win for the brain! 🏆");
        }

        function notifySessionEnd() {
            if (Notification.permission === "granted") {
                new Notification("Time's up!", { body: "Take a break and stretch." });
            }
            showMessage("Session complete! Go walk around for 5 mins. 🚶‍♂️");
        }

        function toggleTheme() {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            document.body.style.backgroundColor = isDark ? '#0f172a' : '#f8fafc';
            document.body.style.color = isDark ? '#f1f5f9' : '#1e293b';
            
            document.querySelectorAll('.task-card, .bg-white').forEach(c => {
                c.style.backgroundColor = isDark ? '#1e293b' : '#ffffff';
                c.style.color = isDark ? '#f1f5f9' : '#1e293b';
            });
            document.getElementById('focusOverlay').style.backgroundColor = isDark ? '#0f172a' : '#ffffff';
        }
    </script>
</body>
</html>
