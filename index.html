<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusFlow - ADHD Friendly Tasks</title>
    <link rel="stylesheet" href="./src/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen pb-24">
    <script type="module" src="./src/main.js"></script>

    <!-- Header -->
    <header class="p-6 max-w-2xl mx-auto flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-bold text-indigo-600">FocusFlow</h1>
            <p class="text-sm text-slate-500" id="current-date"></p>
        </div>
        <button id="themeToggle" class="p-2 rounded-full bg-slate-200 hover:bg-slate-300 transition-colors">
            🌙
        </button>
    </header>

    <main class="max-w-2xl mx-auto px-4 space-y-6">
        
        <!-- Quick Brain Dump -->
        <section class="bg-indigo-50 p-5 rounded-2xl border-2 border-dashed border-indigo-200">
            <h2 class="text-sm font-semibold text-indigo-700 mb-3 flex items-center gap-2">
                🧠 Brain Dump
                <span class="text-[10px] font-normal text-indigo-400 bg-white px-2 py-0.5 rounded-full border border-indigo-100 italic">Clear your head</span>
            </h2>
            <div class="flex gap-2">
                <input type="text" id="taskInput" placeholder="I need to..." 
                    class="w-full p-3 rounded-xl border-none focus:ring-2 focus:ring-indigo-400 outline-none shadow-sm">
                <button id="addTaskBtn" class="bg-indigo-600 text-white px-6 rounded-xl font-bold hover:bg-indigo-700 transition-all active:scale-95">
                    Add
                </button>
            </div>
            <div class="mt-4 flex flex-wrap gap-4 text-xs">
                <span class="font-medium text-slate-600">Current Energy:</span>
                <label class="flex items-center gap-1 cursor-pointer">
                    <input type="radio" name="energy" value="low" checked class="energy-radio accent-emerald-500"> 
                    <span class="px-2 py-0.5 rounded bg-emerald-100 text-emerald-700">Low</span>
                </label>
                <label class="flex items-center gap-1 cursor-pointer">
                    <input type="radio" name="energy" value="medium" class="energy-radio accent-amber-500"> 
                    <span class="px-2 py-0.5 rounded bg-amber-100 text-amber-700">Mid</span>
                </label>
                <label class="flex items-center gap-1 cursor-pointer">
                    <input type="radio" name="energy" value="high" class="energy-radio accent-red-500"> 
                    <span class="px-2 py-0.5 rounded bg-red-100 text-red-700">High</span>
                </label>
            </div>
        </section>

        <!-- Filters -->
        <section class="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
            <button data-filter="all" class="filter-btn whitespace-nowrap px-4 py-2 rounded-full bg-slate-800 text-white text-sm font-medium transition-all">All Tasks</button>
            <button data-filter="low" class="filter-btn whitespace-nowrap px-4 py-2 rounded-full bg-white text-slate-600 border border-slate-200 text-sm font-medium transition-all">Low Energy</button>
            <button data-filter="medium" class="filter-btn whitespace-nowrap px-4 py-2 rounded-full bg-white text-slate-600 border border-slate-200 text-sm font-medium transition-all">Medium Energy</button>
            <button data-filter="high" class="filter-btn whitespace-nowrap px-4 py-2 rounded-full bg-white text-slate-600 border border-slate-200 text-sm font-medium transition-all">High Energy</button>
        </section>

        <!-- Active Tasks List -->
        <section id="taskList" class="space-y-4">
            <!-- Tasks injected here -->
        </section>

        <!-- Empty State -->
        <div id="emptyState" class="text-center py-10 hidden">
            <div class="text-5xl mb-4">✨</div>
            <h3 class="text-lg font-medium text-slate-700">Brain focus achieved!</h3>
            <p class="text-slate-500">Your task list is empty.</p>
        </div>

        <!-- Data Management (Export/Import) -->
        <section class="pt-8 border-t border-slate-200">
            <div class="bg-slate-100 p-4 rounded-2xl flex flex-col sm:flex-row items-center justify-between gap-4">
                <div class="text-center sm:text-left">
                    <h3 class="text-xs font-bold text-slate-500 uppercase tracking-wider">Data Management</h3>
                    <p class="text-[10px] text-slate-400">Save your brain dump for later</p>
                </div>
                <div class="flex gap-2">
                    <button id="exportBtn" class="text-xs font-bold bg-white text-slate-700 px-4 py-2 rounded-lg border border-slate-200 hover:bg-slate-50 transition-colors flex items-center gap-1">
                        📤 Export JSON
                    </button>
                    <label class="text-xs font-bold bg-white text-slate-700 px-4 py-2 rounded-lg border border-slate-200 hover:bg-slate-50 transition-colors cursor-pointer flex items-center gap-1">
                        📥 Import
                        <input type="file" id="importFile" class="hidden" accept=".json">
                    </label>
                </div>
            </div>
        </section>

    </main>

    <!-- Focus Mode Overlay -->
    <div id="focusOverlay" class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-start p-8 hidden overflow-y-auto">
        <button id="closeFocusBtn" class="absolute top-6 right-6 text-slate-400 hover:text-slate-600 text-xl">
            ✕
        </button>
        
        <div class="text-center max-w-md w-full space-y-8 mt-12 pb-12">
            <div>
                <span id="focusEnergyTag" class="px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest"></span>
                <h2 id="focusTaskTitle" class="text-3xl font-bold leading-tight mt-4 text-slate-800"></h2>
            </div>
            
            <div class="relative inline-flex items-center justify-center">
                <svg width="180" height="180">
                    <circle stroke="#f1f5f9" stroke-width="8" fill="transparent" r="75" cx="90" cy="90"/>
                    <circle id="timerRing" stroke="#6366f1" stroke-width="8" stroke-dasharray="471" stroke-dashoffset="0" stroke-linecap="round" fill="transparent" r="75" cx="90" cy="90" class="progress-ring"/>
                </svg>
                <div id="timerDisplay" class="absolute text-2xl font-bold font-mono text-slate-700">25:00</div>
            </div>

            <!-- Focus Subtasks -->
            <div id="focusSubtasksContainer" class="bg-slate-50 p-4 rounded-2xl text-left space-y-3">
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider">Break it down:</h3>
                <div id="focusSubtaskList" class="space-y-2"></div>
            </div>

            <div class="space-y-6 pt-4">
                <div class="flex gap-4 justify-center">
                    <button id="timerBtn" class="flex-1 bg-indigo-600 text-white px-6 py-4 rounded-2xl font-bold shadow-lg shadow-indigo-100 hover:bg-indigo-700 transition-all">Start Timer</button>
                    <button id="completeFocusBtn" class="flex-1 bg-emerald-500 text-white px-6 py-4 rounded-2xl font-bold shadow-lg shadow-emerald-100 hover:bg-emerald-600 transition-all">Complete</button>
                </div>
                <p class="text-slate-400 text-sm italic focus-pulse">"Action cures fear. Just start the first step."</p>
            </div>
        </div>
    </div>

    <!-- Notification Message -->
    <div id="messageBox" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full shadow-2xl opacity-0 transition-opacity duration-300 pointer-events-none z-[100] text-sm font-medium">
        Message here
    </div>

</body>
</html>
